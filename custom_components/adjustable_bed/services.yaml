goto_preset:
  name: Go to Preset
  description: Move bed to a saved memory position.
  fields:
    device_id:
      name: Device
      description: The adjustable bed device.
      required: true
      selector:
        device:
          integration: adjustable_bed
    preset:
      name: Preset Number
      description: Memory slot number (1-6, device-dependent).
      required: true
      selector:
        number:
          min: 1
          max: 6
          mode: box

save_preset:
  name: Save to Preset
  description: Save current bed position to a memory slot.
  fields:
    device_id:
      name: Device
      description: The adjustable bed device.
      required: true
      selector:
        device:
          integration: adjustable_bed
    preset:
      name: Preset Number
      description: Memory slot number (1-6, device-dependent).
      required: true
      selector:
        number:
          min: 1
          max: 6
          mode: box

stop_all:
  name: Stop All Motors
  description: Immediately stop all bed motors.
  fields:
    device_id:
      name: Device
      description: The adjustable bed device.
      required: true
      selector:
        device:
          integration: adjustable_bed

set_position:
  name: Set Motor Position
  description: Move a motor to a specific position and stop when reached. Only works for beds with position feedback (Linak, Okimat, Reverie, Keeson, Ergomotion, BOX25 Star).
  fields:
    device_id:
      name: Device
      description: The adjustable bed device.
      required: true
      selector:
        device:
          integration: adjustable_bed
    motor:
      name: Motor
      description: The motor to move.
      required: true
      selector:
        select:
          options:
            - label: Back
              value: back
            - label: Legs
              value: legs
            - label: Head
              value: head
            - label: Feet
              value: feet
    position:
      name: Position
      description: Target position (0-68° for back/head, 0-45° for legs/feet, 0-100% for Keeson/Ergomotion/BOX25 Star).
      required: true
      selector:
        number:
          min: 0
          max: 100
          mode: slider

timed_move:
  name: Timed Move
  description: Move a motor for a specified duration. Useful for beds without presets or position feedback.
  fields:
    device_id:
      name: Device
      description: The adjustable bed device.
      required: true
      selector:
        device:
          integration: adjustable_bed
    motor:
      name: Motor
      description: The motor to move.
      required: true
      selector:
        select:
          options:
            - label: Back
              value: back
            - label: Legs
              value: legs
            - label: Head
              value: head
            - label: Feet
              value: feet
            - label: Tilt
              value: tilt
            - label: Lumbar
              value: lumbar
            - label: Bed Height
              value: bed_height
    direction:
      name: Direction
      description: Direction to move the motor.
      required: true
      selector:
        select:
          options:
            - label: Up
              value: up
            - label: Down
              value: down
    duration_ms:
      name: Duration (ms)
      description: How long to move the motor in milliseconds (100-30000).
      required: true
      selector:
        number:
          min: 100
          max: 30000
          step: 100
          unit_of_measurement: ms
          mode: box

generate_support_bundle:
  name: Generate Support Bundle
  description: Capture the full adjustable-bed support bundle. This combines BLE diagnostics, detection reasoning, GATT details, scanner state, and recent integration logs into one JSON file.
  fields:
    device_id:
      name: Device
      description: A configured adjustable bed device to capture.
      required: false
      selector:
        device:
          integration: adjustable_bed
    target_address:
      name: Target Address
      description: Bluetooth MAC address of an unconfigured device (for example `AA:BB:CC:DD:EE:FF`).
      required: false
      example: "AA:BB:CC:DD:EE:FF"
      selector:
        text:
    capture_duration:
      name: Capture Duration
      description: How long to capture notifications in seconds. Operate the physical remote during this time to generate useful traffic.
      required: false
      default: 120
      selector:
        number:
          min: 10
          max: 300
          unit_of_measurement: seconds
          mode: box
    include_logs:
      name: Include Recent Logs
      description: Include recent Home Assistant log entries related to Bluetooth and this integration.
      required: false
      default: true
      selector:
        boolean:
