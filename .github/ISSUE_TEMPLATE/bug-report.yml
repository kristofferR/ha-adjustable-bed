name: Bug Report
description: Report a problem with the Adjustable Bed integration
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this bug! Please fill out the form below to help us diagnose and fix the issue.

        **Before submitting:**
        - Check the [Troubleshooting Guide](https://github.com/kristofferR/ha-adjustable-bed/blob/master/docs/TROUBLESHOOTING.md) for common solutions
        - Read the [Getting Help Guide](https://github.com/kristofferR/ha-adjustable-bed/blob/master/docs/GETTING_HELP.md) for how to gather diagnostics
        - Search [existing issues](https://github.com/kristofferR/ha-adjustable-bed/issues) to avoid duplicates

  - type: textarea
    id: description
    attributes:
      label: Describe the Bug
      description: What happened and what did you expect to happen?
      placeholder: |
        When I try to move the head of the bed up, nothing happens.
        Expected: The head of the bed should move up when I press the button.
    validations:
      required: true

  - type: input
    id: bed_type
    attributes:
      label: Bed Type
      description: Which bed type is configured in the integration?
      placeholder: "e.g., Richmat, Keeson, Linak, Leggett & Platt"
    validations:
      required: true

  - type: input
    id: integration_version
    attributes:
      label: Integration Version
      description: "Settings → Integrations → Adjustable Bed → version shown"
      placeholder: "e.g., 1.4.0"
    validations:
      required: false

  - type: dropdown
    id: connection_method
    attributes:
      label: Bluetooth Connection Method
      description: How is your Home Assistant connected to the bed?
      options:
        - Built-in Bluetooth adapter
        - USB Bluetooth adapter
        - ESPHome Bluetooth Proxy
        - Other (describe below)
    validations:
      required: true

  - type: textarea
    id: diagnostics
    attributes:
      label: Support Bundle
      description: |
        **This is the single most important thing you can attach.** Without it, we'll need to ask for one before we can investigate.

        1. Go to Developer Tools → Actions
        2. Search for `adjustable_bed.generate_support_bundle`
        3. Select your bed device and click "Perform action"
        4. Click the **download link** in the notification that appears
        5. Drag and drop the JSON file here

        **Alternative:** Download diagnostics from Settings → Integrations → Adjustable Bed → ⋮ → Download diagnostics
      placeholder: "Drag and drop the support bundle JSON file here"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Additional Logs
      description: |
        The support bundle already includes recent logs. Only add extra logs here if you have **debug logging** output that captures the specific issue:
        1. Settings → Devices & Services → Adjustable Bed → ⋮ → Enable debug logging
        2. Reproduce the issue
        3. Disable debug logging (browser downloads the log file)
        4. Paste or attach the relevant entries
      render: text
      placeholder: "Paste debug log entries here (optional — the support bundle already includes logs)"
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: |
        Add any other context about the problem here:
        - Does the physical remote work?
        - Did this work before? What changed?
        - Any error messages in the UI?
        - Screenshots of the issue?
      placeholder: "The physical remote still works fine..."
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      description: Please confirm you've done the following
      options:
        - label: I have checked the [Troubleshooting Guide](https://github.com/kristofferR/ha-adjustable-bed/blob/master/docs/TROUBLESHOOTING.md)
          required: true
        - label: I have read the [Getting Help Guide](https://github.com/kristofferR/ha-adjustable-bed/blob/master/docs/GETTING_HELP.md) for how to gather diagnostics
          required: true
        - label: I have searched for [existing issues](https://github.com/kristofferR/ha-adjustable-bed/issues)
          required: true
        - label: I have attached a support bundle or diagnostics file
          required: true
